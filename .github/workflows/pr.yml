name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            semgrep/semgrep semgrep \
            --config auto --config p/java --config p/spring \
            --sarif --output /src/semgrep.sarif /src

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Generate SBOM from pom.xml
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -q

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: target/bom.json

      - name: Build image
        run: docker build -t security-scanner:${{ github.sha }} .

      - name: Generate image SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/out \
            anchore/syft:latest \
            security-scanner:${{ github.sha }} \
            -o spdx-json=/out/sbom-image.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-image-${{ github.sha }}
          path: sbom-image.spdx.json

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            aquasecurity/trivy:latest fs \
            --format sarif --output /workspace/trivy-fs.sarif \
            --severity CRITICAL,HIGH --exit-code 1 \
            /workspace

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

      - name: Build image
        run: docker build -t security-scanner:${{ github.sha }} .

      - name: Trivy container scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workspace \
            aquasecurity/trivy:latest image \
            --format sarif --output /workspace/trivy-image.sarif \
            --severity CRITICAL,HIGH --exit-code 1 \
            security-scanner:${{ github.sha }}

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif