name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - uses: hashicorp/setup-terraform@v3

      - name: Test
        run: ./mvnw test

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Helm lint
        run: helm lint helm/security-scanner

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            semgrep/semgrep semgrep \
            --config auto --config p/java --config p/spring \
            --sarif --output /src/semgrep.sarif /src

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  trivy-fs:
    name: Trivy Filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  deploy:
    name: Build, Scan, Sign & Deploy
    runs-on: ubuntu-latest
    needs: [quality, sast, trivy-fs]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: sigstore/cosign-installer@v3

      - name: Build image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/security-scanner:${{ github.sha }}
        run: docker build -t "$IMAGE" .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/security-scanner:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

      - name: Push image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/security-scanner:${{ github.sha }}
        run: docker push "$IMAGE"

      - name: Resolve image digest
        id: image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/security-scanner:${{ github.sha }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE%@*}@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Sign image
        run: cosign sign --yes "${{ steps.image.outputs.ref }}"

      - name: Generate image SBOM
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/out \
            anchore/syft:latest \
            "$IMAGE_REF" \
            -o spdx-json=/out/sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name security-scanner-cluster --region us-west-2

      - name: Helm deploy
        run: |
          helm upgrade --install security-scanner ./helm/security-scanner \
            --set image.repository=${{ steps.ecr.outputs.registry }}/security-scanner \
            --set image.tag=${{ github.sha }} \
            --set-string image.digest=${{ steps.image.outputs.digest }} \
            --set db.url=${{ secrets.DB_URL }} \
            --set db.username=${{ secrets.DB_USERNAME }} \
            --set db.password=${{ secrets.DB_PASSWORD }} \
            --set scanner.apiKey=${{ secrets.SCANNER_API_KEY }} \
            --set ingress.host=${{ vars.APP_HOST }} \
            --wait --timeout 5m
