apiVersion: v1
kind: Service
metadata:
  name: {{ include "security-scanner.fullname" . }}
  labels:
    {{- include "security-scanner.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "security-scanner.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP